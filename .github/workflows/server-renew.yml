name: Auto Renew Server Script

on:
  workflow_dispatch:
  schedule:
   - cron: '0 */3 * * *'

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get install -y google-chrome-stable

      - name: 🛡️ 启动 Hysteria2 代理客户端
        run: |
          echo "下载 Hysteria2..."
          wget -q -O hysteria "https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64"
          chmod +x hysteria
          
          echo "生成配置文件..."
          cat << 'EOF' > config.yaml
          ${{ secrets.HY2_CONFIG }}
          EOF
          
          echo "启动 Hysteria2 客户端..."
          nohup ./hysteria client -c config.yaml > hy2.log 2>&1 &
          sleep 5
          
          echo "测试本地代理连通性..."
          curl -x http://127.0.0.1:8080 https://api.ipify.org -v

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: http://127.0.0.1:8080  # 这里改为 Socks5
        run: python main.py

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: ./*.html
          retention-days: 5
