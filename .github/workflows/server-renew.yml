name: Auto Renew Server Script

on:
  workflow_dispatch:
  schedule:
   - cron: '0 */4 * * *'

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get install -y google-chrome-stable

      - name: 🛡️ 启动 Xray 代理客户端 (单次运行随机路由)
        run: |
          echo "下载 Xray-core..."
          wget -q -O xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          unzip -q xray.zip -d xray-core
          chmod +x xray-core/xray
          
          echo "加载原始节点池..."
          cat << 'EOF' > config_raw.json
          ${{ secrets.VLESS_CONFIG }}
          EOF
          
          echo "执行动态随机抽取并提取节点名称..."
          python -c "
          import json, random, os
          with open('config_raw.json', 'r') as f:
              data = json.load(f)
          
          random.shuffle(data['outbounds'])
          
          with open('config.json', 'w') as f:
              json.dump(data, f)
          
          # 提取当前使用的节点特征 (优先提取伪装域名 SNI/Host，其次提取 IP)
          selected = data['outbounds'][0]
          node_name = 'Unknown'
          try:
              if 'streamSettings' in selected:
                  if 'tlsSettings' in selected['streamSettings']:
                      node_name = selected['streamSettings']['tlsSettings'].get('serverName', '')
                  if not node_name and 'wsSettings' in selected['streamSettings']:
                      node_name = selected['streamSettings']['wsSettings'].get('headers', {}).get('Host', '')
              if not node_name:
                  node_name = selected['settings']['vnext'][0]['address']
          except:
              node_name = '解析异常'
          
          # 将节点信息写入 GitHub 环境变量，供下一个步骤的 main.py 读取
          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f'SELECTED_NODE={node_name}\n')
          "
          
          echo "启动 Xray 客户端..."
          nohup ./xray-core/xray -c config.json > xray.log 2>&1 &
          sleep 5

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: http://127.0.0.1:8080  # 这里改为 Socks5
        run: python main.py

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: ./*.html
          retention-days: 5
